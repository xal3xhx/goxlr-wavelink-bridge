<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoXLR-WaveLink Bridge - Configuration</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>GoXLR-WaveLink Bridge</h1>

    <div class="status-bar" id="statusBar">
      <div class="status-item">
        <span class="dot" id="goxlrDot"></span>
        <span>GoXLR: <span id="goxlrStatus">Checking...</span></span>
      </div>
      <div class="status-item">
        <span class="dot" id="wavelinkDot"></span>
        <span>Wave Link: <span id="wavelinkStatus">Checking...</span></span>
      </div>
    </div>

    <div class="setup-info" id="setupInfo">
      <h3>Setup Instructions</h3>
      <p>For fader isolation, assign your GoXLR faders to unused channels in GoXLR Utility:</p>
      <ul id="setupSteps"></ul>
      <p class="note">This ensures moving a fader won't affect your actual audio routing (voice FX, mic volume, etc.).</p>
    </div>

    <h2>Fader Mappings</h2>
    <div id="mappings"></div>

    <div class="actions">
      <button id="saveBtn" class="btn primary">Save Configuration</button>
      <button id="refreshBtn" class="btn">Refresh</button>
    </div>
    <div id="saveStatus" class="save-status"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
